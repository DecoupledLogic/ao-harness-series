name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Harness.slnx

      - name: Build
        run: dotnet build Harness.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Harness.slnx --no-build --configuration Release --verbosity normal
